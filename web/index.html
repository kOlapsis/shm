<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHM Hub</title>
    <link rel="icon" type="image/x-icon" href="/assets/shm-logo.ico">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: { 750: '#2d3748', 850: '#1a202c', 900: '#171923', 950: '#0d1117' },
                        primary: { 500: '#6366f1', 600: '#4f46e5' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.5s ease-out' },
                    keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } } }
                }
            }
        }
    </script>

    <!-- External Dependencies (with SRI where possible) -->
    <!-- Phosphor Icons: SRI omitted due to dynamic resource loading -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js" integrity="sha384-cVMg8E3QFwTvGCDuK+ET4PD341jF3W8nO1auiXfuZNQkzbUUiBGLsIQUE+b1mxws" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Alpine.js App (ES Module) -->
    <script type="module" src="/js/app.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        /* Honour reduced-motion preference */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        /* Visible focus ring for keyboard users */
        :focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
            border-radius: 4px;
        }
        /* Skip-link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #4f46e5;
            color: #fff;
            padding: 8px 16px;
            z-index: 100;
            transition: top 0.2s;
            font-weight: 600;
        }
        .skip-link:focus { top: 0; }
    </style>
</head>

<body class="bg-gray-950 text-gray-200 font-sans antialiased overflow-hidden">

<!-- Accessibility: skip to main content -->
<a href="#main-content" class="skip-link">Skip to main content</a>

<!-- Mobile sidebar backdrop -->
<div
    x-data
    x-show="$store.ui.mobileMenuOpen"
    x-cloak
    x-transition.opacity
    @click="$store.ui.closeMenu()"
    class="fixed inset-0 z-30 bg-black/60 backdrop-blur-sm lg:hidden"
    aria-hidden="true"
></div>

<!-- ===== SIDEBAR ===== -->
<aside
    id="app-sidebar"
    x-data="sidebar"
    class="fixed left-0 top-0 h-full w-72 lg:w-64 bg-gray-900 border-r border-gray-800 z-40 flex flex-col transform transition-transform duration-300 ease-out lg:translate-x-0"
    :class="$store.ui.mobileMenuOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full'"
    :aria-hidden="!$store.ui.mobileMenuOpen && $store.ui.isMobile() ? 'true' : 'false'"
    aria-label="Applications navigation"
>
    <!-- Header -->
    <div class="p-4 border-b border-gray-800">
        <div class="flex items-center justify-between gap-3 mb-4">
            <div class="flex items-center gap-3 min-w-0">
                <img src="/assets/shm-logo.svg" alt="" class="w-8 h-8 flex-shrink-0" aria-hidden="true">
                <span class="font-bold text-lg tracking-tight text-white truncate">SHM <span class="text-gray-500 font-medium">Hub</span></span>
            </div>
            <button
                @click="$store.ui.closeMenu()"
                class="lg:hidden p-2 -mr-1 text-gray-400 hover:text-white hover:bg-gray-800 rounded-lg transition-colors"
                aria-label="Close navigation menu"
            >
                <i class="ph-bold ph-x text-lg" aria-hidden="true"></i>
            </button>
        </div>

        <!-- Search Bar -->
        <div class="relative">
            <label for="sidebar-search" class="sr-only">Search applications</label>
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm" aria-hidden="true"></i>
            <input
                id="sidebar-search"
                type="search"
                @input="onSearch($event.target.value)"
                placeholder="Search apps..."
                autocomplete="off"
                class="w-full bg-gray-950 border border-gray-800 rounded-lg pl-9 pr-3 py-2 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500"
            >
        </div>
    </div>

    <!-- Apps List -->
    <div class="flex-1 overflow-y-auto p-4 space-y-1">
        <button
            @click="selectApp(null)"
            class="w-full text-left px-3 py-2 rounded-lg transition-colors flex items-center justify-between group"
            :class="isSelected(null) ? 'bg-primary-500/10 text-primary-400 border border-primary-500/20' : 'text-gray-400 hover:bg-gray-800 hover:text-gray-300'"
        >
            <div class="flex items-center gap-2">
                <i class="ph-bold ph-stack text-sm"></i>
                <span class="text-sm font-medium">All Applications</span>
            </div>
            <span class="text-xs font-mono px-2 py-0.5 rounded bg-gray-800 text-gray-500 group-hover:bg-gray-700" x-text="$store.dashboard.stats.total_instances"></span>
        </button>

        <div class="border-t border-gray-800 my-2"></div>

        <template x-for="app in filteredApps" :key="app.slug">
            <button
                @click="selectApp(app.name)"
                class="w-full text-left px-3 py-2 rounded-lg transition-colors flex items-center justify-between group"
                :class="isSelected(app.name) ? 'bg-primary-500/10 text-primary-400 border border-primary-500/20' : 'text-gray-400 hover:bg-gray-800 hover:text-gray-300'"
            >
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <div class="w-6 h-6 rounded bg-gray-800 border border-gray-700 flex items-center justify-center flex-shrink-0 overflow-hidden">
                        <img
                            x-show="app.logo_url"
                            :src="app.logo_url ? app.logo_url + '?_r=' + $store.dashboard.refreshKey : ''"
                            :alt="app.name"
                            class="w-full h-full object-contain p-0.5"
                            @error="$el.style.display='none'; $el.nextElementSibling.style.display='block'"
                            @load="$el.style.display='block'; $el.nextElementSibling.style.display='none'"
                        >
                        <span
                            class="text-xs font-bold text-indigo-400"
                            :style="app.logo_url ? 'display:none' : ''"
                            x-text="app.name.charAt(0).toUpperCase()"
                        ></span>
                    </div>
                    <span class="text-sm font-medium truncate" x-text="app.name"></span>
                </div>
                <span class="text-xs font-mono px-2 py-0.5 rounded bg-gray-800 text-gray-500 group-hover:bg-gray-700 flex-shrink-0" x-text="getCount(app.name)"></span>
            </button>
        </template>

        <template x-if="$store.dashboard.applications.length === 0 && !$store.dashboard.loading">
            <div class="text-center py-8 text-gray-600">
                <i class="ph-duotone ph-ghost text-2xl mb-2"></i>
                <p class="text-xs">No applications yet</p>
            </div>
        </template>
    </div>

    <!-- Footer -->
    <div class="p-4 border-t border-gray-800">
        <div class="flex items-center justify-between text-xs text-gray-500">
            <div class="flex items-center gap-3" title="Health: ok / late / silent">
                <div class="flex items-center gap-1.5">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span x-text="$store.dashboard.stats.active_instances"></span>
                </div>
                <div class="flex items-center gap-1.5" x-show="$store.dashboard.stats.late_instances > 0">
                    <span class="inline-flex rounded-full h-2 w-2 bg-amber-500"></span>
                    <span x-text="$store.dashboard.stats.late_instances"></span>
                </div>
                <div class="flex items-center gap-1.5" x-show="$store.dashboard.stats.silent_instances > 0">
                    <span class="inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                    <span x-text="$store.dashboard.stats.silent_instances"></span>
                </div>
            </div>
            <button @click="refresh()" class="p-1 text-gray-500 hover:text-white hover:bg-gray-800 rounded transition-colors" :disabled="$store.dashboard.loading" aria-label="Refresh data">
                <i class="ph-bold ph-arrows-clockwise text-sm" :class="{ 'animate-spin': $store.dashboard.loading }" aria-hidden="true"></i>
            </button>
        </div>
    </div>
</aside>

<!-- ===== TOP NAVBAR ===== -->
<nav class="fixed top-0 left-0 lg:left-64 right-0 z-30 bg-gray-950/80 backdrop-blur-md border-b border-gray-800" x-data="navbar">
    <div class="px-3 sm:px-4 lg:px-6">
        <div class="flex h-16 items-center justify-between gap-2 sm:gap-3">
            <div class="flex items-center gap-2 sm:gap-3 min-w-0 flex-1">
                <!-- Hamburger (mobile only) -->
                <button
                    @click="$store.ui.toggleMenu()"
                    class="lg:hidden flex-shrink-0 p-2.5 -ml-1 text-gray-300 hover:text-white hover:bg-gray-800 rounded-lg transition-colors"
                    :aria-expanded="$store.ui.mobileMenuOpen ? 'true' : 'false'"
                    aria-controls="app-sidebar"
                    aria-label="Toggle navigation menu"
                >
                    <i class="ph-bold ph-list text-xl" aria-hidden="true"></i>
                </button>

                <div class="min-w-0 flex-1">
                    <h1 class="text-base sm:text-lg lg:text-xl font-bold text-white truncate" x-text="title"></h1>
                    <span class="hidden sm:block text-xs text-gray-500 truncate" x-text="countText"></span>
                </div>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <!-- Mobile: search-toggle button -->
                <button
                    @click="toggleMobileSearch()"
                    class="sm:hidden p-2.5 text-gray-300 hover:text-white hover:bg-gray-800 rounded-lg transition-colors"
                    :aria-expanded="mobileSearchOpen ? 'true' : 'false'"
                    aria-controls="instance-search"
                    aria-label="Search instances"
                >
                    <i class="ph-bold ph-magnifying-glass text-lg" aria-hidden="true"></i>
                </button>

                <!-- Desktop / sm+: inline search input -->
                <div class="relative hidden sm:flex items-center">
                    <label for="instance-search" class="sr-only">Search instances</label>
                    <div class="absolute left-3 w-4 h-4 flex items-center justify-center text-gray-500" aria-hidden="true">
                        <i x-show="!isSearching" class="ph-bold ph-magnifying-glass text-sm"></i>
                        <i x-show="isSearching" class="ph-bold ph-spinner animate-spin text-sm"></i>
                    </div>
                    <input
                        id="instance-search"
                        type="search"
                        x-model="searchQuery"
                        placeholder="Search instances..."
                        autocomplete="off"
                        class="bg-gray-900 border border-gray-800 rounded-lg pl-9 pr-3 py-2 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 w-40 md:w-56 lg:w-64"
                    >
                </div>
            </div>
        </div>

        <!-- Mobile collapsible search row -->
        <div
            x-show="mobileSearchOpen"
            x-cloak
            x-transition:enter="transition ease-out duration-150"
            x-transition:enter-start="opacity-0 -translate-y-1"
            x-transition:enter-end="opacity-100 translate-y-0"
            class="sm:hidden pb-3"
        >
            <div class="relative">
                <label for="instance-search-mobile" class="sr-only">Search instances</label>
                <div class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 flex items-center justify-center text-gray-500" aria-hidden="true">
                    <i x-show="!isSearching" class="ph-bold ph-magnifying-glass text-sm"></i>
                    <i x-show="isSearching" class="ph-bold ph-spinner animate-spin text-sm"></i>
                </div>
                <input
                    id="instance-search-mobile"
                    type="search"
                    x-model="searchQuery"
                    x-ref="mobileSearchInput"
                    placeholder="Search instances..."
                    autocomplete="off"
                    class="w-full bg-gray-900 border border-gray-800 rounded-lg pl-9 pr-3 py-2.5 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500"
                >
            </div>
        </div>
    </div>
</nav>

<!-- ===== MAIN CONTENT ===== -->
<main
    id="main-content"
    class="fixed top-16 left-0 lg:left-64 right-0 bottom-0 overflow-y-auto"
    x-data="mainContent"
    @scroll.passive="handleScroll"
    tabindex="-1"
>
    <div class="p-3 sm:p-4 lg:p-6">
        <template x-for="(group, appName) in displayedGroups" :key="appName">
            <section class="mb-8 sm:mb-12 animate-fade-in" x-data="appSection">
                <!-- App Header -->
                <div class="flex items-center justify-between gap-3 mb-4 sm:mb-6 border-b border-gray-800 pb-3 sm:pb-4">
                    <div class="flex items-center gap-3 sm:gap-4 min-w-0 flex-1">
                        <!-- Logo or Initial (with fallback) -->
                        <div class="w-10 h-10 rounded-lg bg-gray-800 border border-gray-700 flex items-center justify-center shadow-inner overflow-hidden"
                             x-data="{ get logoUrl() { return $store.dashboard.applications.find(a => a.slug === group.appSlug)?.logo_url } }">
                            <img
                                x-show="logoUrl"
                                :src="logoUrl ? logoUrl + '?_r=' + $store.dashboard.refreshKey : ''"
                                :alt="appName"
                                class="w-full h-full object-contain p-1"
                                @error="$el.style.display='none'; $el.nextElementSibling.style.display='block'"
                                @load="$el.style.display='block'; $el.nextElementSibling.style.display='none'"
                            >
                            <span
                                class="text-lg font-bold text-indigo-400"
                                x-show="!logoUrl"
                                x-text="appName.charAt(0).toUpperCase()"
                            ></span>
                        </div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h2 class="text-lg sm:text-xl font-bold text-white truncate max-w-[200px] sm:max-w-none" x-text="appName"></h2>
                                <template x-if="group.githubUrl && group.githubStars > 0">
                                    <a :href="group.githubUrl" target="_blank" class="flex items-center gap-1 px-2 py-0.5 rounded bg-gray-800 border border-gray-700 hover:border-gray-600 transition-colors text-xs text-gray-400 hover:text-gray-300">
                                        <i class="ph-fill ph-star text-yellow-500"></i>
                                        <span class="font-mono" x-text="formatNumber(group.githubStars || 0)"></span>
                                    </a>
                                </template>
                            </div>
                            <div class="text-xs text-gray-500 flex gap-2">
                                <span x-text="`${getAppTotalCount(appName)} instances`"></span>
                                <span>&bull;</span>
                                <span x-text="`Updated ${timeAgo(group.lastSeenGlobal)}`"></span>
                            </div>
                        </div>
                    </div>
                    <!-- Edit Button -->
                    <button
                        @click.stop="openEditModal(group.appSlug)"
                        class="p-2 text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors border border-gray-700"
                        title="Edit application settings"
                        aria-label="Edit application settings"
                    >
                        <i class="ph-bold ph-gear text-lg" aria-hidden="true"></i>
                    </button>
                </div>

                <!-- Metrics Cards -->
                <div class="flex gap-3 mb-6">
                    <!-- OS Distribution Card -->
                    <div class="flex-1 min-w-0 bg-gradient-to-br from-gray-900 to-gray-900/50 hover:from-gray-800 hover:to-gray-800/50 transition-colors rounded-lg p-3 border border-gray-800">
                        <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest truncate mb-2">OS Distribution</p>
                        <div class="space-y-1">
                            <template x-for="(count, os) in group.osCounts" :key="os">
                                <div class="flex items-center justify-between text-xs">
                                    <div class="flex items-center gap-1.5">
                                        <i class="ph-fill text-gray-600" :class="getOSIcon(os)"></i>
                                        <span class="text-gray-400 capitalize" x-text="os"></span>
                                    </div>
                                    <span class="text-white font-mono font-bold" x-text="count"></span>
                                </div>
                            </template>
                            <template x-if="!group.osCounts || Object.keys(group.osCounts).length === 0">
                                <div class="text-xs text-gray-600 italic">No OS data</div>
                            </template>
                        </div>
                    </div>

                    <!-- Business Metrics Cards -->
                    <template x-for="key in group.businessKeys" :key="key">
                        <button
                            @click="toggleMetricChart(appName, key)"
                            class="flex-1 min-w-0 bg-gray-900/50 hover:bg-gray-800 transition-all rounded-lg p-3 border text-left"
                            :class="isMetricSelected(appName, key) ? 'border-primary-500 ring-2 ring-primary-500/20' : 'border-gray-800'"
                        >
                            <div class="flex items-start justify-between gap-2">
                                <div class="flex-1 min-w-0">
                                    <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest truncate mb-1" x-text="formatKey(key)"></p>
                                    <p class="text-xl font-bold text-white font-mono" x-text="formatNumber(group.sums[key])"></p>
                                </div>
                                <i class="ph-bold ph-chart-line text-sm flex-shrink-0" :class="isMetricSelected(appName, key) ? 'text-primary-500' : 'text-gray-600'"></i>
                            </div>
                        </button>
                    </template>
                </div>

                <!-- Chart Panel -->
                <div
                    x-show="getSelectedMetric(appName)"
                    x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 -translate-y-2"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    x-transition:leave="transition ease-in duration-150"
                    x-transition:leave-start="opacity-100 translate-y-0"
                    x-transition:leave-end="opacity-0 -translate-y-2"
                    class="mb-4 sm:mb-6 bg-gray-900 border border-gray-800 rounded-xl overflow-hidden"
                >
                    <!-- Chart Header -->
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 border-b border-gray-800 px-4 sm:px-6 py-3 sm:py-4">
                        <div class="flex items-center gap-3 min-w-0">
                            <i class="ph-bold ph-chart-line text-primary-500 text-lg flex-shrink-0" aria-hidden="true"></i>
                            <div class="min-w-0">
                                <h3 class="text-sm font-bold text-white truncate" x-text="formatKey(getSelectedMetric(appName))"></h3>
                                <p class="text-xs text-gray-500">Time series evolution</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 flex-wrap" role="group" aria-label="Chart time range">
                            <template x-for="period in periods" :key="period">
                                <button
                                    @click="selectPeriod(appName, period)"
                                    class="px-3 py-1.5 rounded text-xs font-medium transition-colors"
                                    :class="getPeriod(appName) === period ? 'bg-primary-500 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-300'"
                                    :aria-pressed="getPeriod(appName) === period ? 'true' : 'false'"
                                    x-text="period"
                                ></button>
                            </template>
                            <button @click="closeChart(appName)" class="ml-1 p-2 text-gray-500 hover:text-white hover:bg-gray-800 rounded transition-colors" aria-label="Close chart">
                                <i class="ph-bold ph-x text-sm" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Chart Content -->
                    <div class="p-3 sm:p-6 relative">
                        <div x-show="isChartLoading(appName)" class="absolute inset-0 flex items-center justify-center bg-gray-900/80 z-10">
                            <div class="text-center">
                                <i class="ph-bold ph-circle-notch animate-spin text-3xl text-gray-500"></i>
                                <p class="text-sm text-gray-500 mt-3">Loading chart data...</p>
                            </div>
                        </div>
                        <template x-if="hasNoData(appName) && !isChartLoading(appName)">
                            <div class="flex items-center justify-center py-12 text-gray-500">
                                <div class="text-center">
                                    <i class="ph-bold ph-info text-2xl mb-2"></i>
                                    <p class="text-sm">No data for this metric.</p>
                                </div>
                            </div>
                        </template>
                        <canvas
                            :id="canvasId(appName)"
                            x-show="!hasNoData(appName)"
                            class="w-full"
                            style="max-height: 300px;"
                        ></canvas>
                    </div>
                </div>

                <!-- Instances Table -->
                <div class="bg-gray-900 border border-gray-800 rounded-xl shadow-lg overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead>
                                <tr class="bg-gray-850 border-b border-gray-800 text-[10px] text-gray-400 font-bold uppercase tracking-wider">
                                    <th class="px-5 py-3 w-48 cursor-pointer select-none hover:text-white transition-colors" @click="$store.dashboard.setSortKey(appName, 'instance_id')">
                                        Instance
                                        <i class="ph-bold text-[9px] ml-0.5" :class="$store.dashboard.getSortIcon(appName, 'instance_id')"></i>
                                    </th>
                                    <th class="px-5 py-3 w-32 cursor-pointer select-none hover:text-white transition-colors" @click="$store.dashboard.setSortKey(appName, 'environment')">
                                        Context
                                        <i class="ph-bold text-[9px] ml-0.5" :class="$store.dashboard.getSortIcon(appName, 'environment')"></i>
                                    </th>
                                    <template x-for="key in group.businessKeys" :key="key">
                                        <th class="px-5 py-3 text-right text-indigo-300 cursor-pointer select-none hover:text-indigo-200 transition-colors" @click="$store.dashboard.setSortKey(appName, key)">
                                            <span x-text="formatKey(key)"></span>
                                            <i class="ph-bold text-[9px] ml-0.5" :class="$store.dashboard.getSortIcon(appName, key)"></i>
                                        </th>
                                    </template>
                                    <th class="px-5 py-3 text-right w-24 cursor-pointer select-none hover:text-white transition-colors" @click="$store.dashboard.setSortKey(appName, 'last_seen_at')">
                                        Seen
                                        <i class="ph-bold text-[9px] ml-0.5" :class="$store.dashboard.getSortIcon(appName, 'last_seen_at')"></i>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800/50">
                                <template x-for="inst in group.displayedInstances" :key="inst.instance_id">
                                    <tr
                                        class="hover:bg-gray-800/40 focus:bg-gray-800/60 focus:outline-none transition-colors cursor-pointer group"
                                        tabindex="0"
                                        role="button"
                                        :aria-label="`Open details for instance ${inst.instance_id.substring(0, 8)}`"
                                        @click="openDrawer(inst, group.resourceKeys)"
                                        @keydown.enter.prevent="openDrawer(inst, group.resourceKeys)"
                                        @keydown.space.prevent="openDrawer(inst, group.resourceKeys)"
                                    >
                                        <td class="px-5 py-3">
                                            <div class="flex items-center gap-2">
                                                <div class="w-1.5 h-1.5 rounded-full" :class="healthMeta(inst.health).dot" :title="healthMeta(inst.health).label"></div>
                                                <span class="font-mono text-gray-300 text-xs" x-text="inst.instance_id.substring(0, 8)"></span>
                                            </div>
                                            <div class="pl-3.5 mt-1 flex items-center gap-2">
                                                <span class="text-[9px] px-1.5 py-0.5 rounded bg-gray-800 border border-gray-700 text-gray-400" x-text="`v${inst.app_version}`"></span>
                                                <template x-for="tagKey in group.stringKeys" :key="tagKey">
                                                    <template x-if="inst.metrics?.[tagKey] && getIconForTag(inst.metrics[tagKey]) !== 'ph-tag'">
                                                        <i class="ph-fill text-xs text-gray-600" :class="getIconForTag(inst.metrics[tagKey])"></i>
                                                    </template>
                                                </template>
                                            </div>
                                        </td>
                                        <td class="px-5 py-3">
                                            <div class="text-gray-300 text-xs font-medium" x-text="inst.environment"></div>
                                            <div class="text-[9px] text-gray-500 uppercase" x-text="inst.deployment_mode"></div>
                                        </td>
                                        <template x-for="key in group.businessKeys" :key="key">
                                            <td class="px-5 py-3 text-right font-mono text-sm text-gray-200">
                                                <span
                                                    x-text="inst.metrics?.[key] !== undefined ? formatNumber(inst.metrics[key]) : '-'"
                                                    :class="{ 'text-gray-700': inst.metrics?.[key] === undefined }"
                                                ></span>
                                            </td>
                                        </template>
                                        <td class="px-5 py-3 text-right">
                                            <span class="text-xs text-gray-500" x-text="timeAgo(inst.last_seen_at)"></span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination footer: actively loading -->
                    <template x-if="group.isFetchingMore">
                        <div class="flex items-center justify-center gap-2 py-4 text-gray-500 text-sm" role="status" aria-live="polite">
                            <i class="ph-bold ph-circle-notch animate-spin" aria-hidden="true"></i>
                            <span>Loading more instances...</span>
                        </div>
                    </template>

                    <!-- Pagination footer: more available locally, scroll hint -->
                    <template x-if="!group.isFetchingMore && group.hasMore">
                        <div class="flex items-center justify-center gap-2 py-4 text-gray-500 text-xs" aria-hidden="true">
                            <i class="ph-bold ph-caret-double-down" aria-hidden="true"></i>
                            <span x-text="`Scroll for more (${group.displayedInstances.length} of ${group.instances.length})`"></span>
                        </div>
                    </template>

                    <!-- Pagination footer: cache shown, server may have more -->
                    <template x-if="!group.isFetchingMore && !group.hasMore && group.canFetchMore">
                        <button
                            @click="$store.dashboard.loadMoreInstances(appName)"
                            class="w-full flex items-center justify-center gap-2 py-4 text-gray-500 hover:text-gray-300 hover:bg-gray-800/40 transition-colors text-xs"
                        >
                            <i class="ph-bold ph-arrow-down" aria-hidden="true"></i>
                            <span>Load more from server</span>
                        </button>
                    </template>

                    <!-- Pagination footer: exhausted -->
                    <template x-if="group.isExhausted && group.displayedInstances.length >= 25">
                        <div class="flex items-center justify-center gap-2 py-4 text-gray-600 text-xs" aria-hidden="true">
                            <span class="h-px w-8 bg-gray-800"></span>
                            <span x-text="`All ${group.displayedInstances.length} instances loaded`"></span>
                            <span class="h-px w-8 bg-gray-800"></span>
                        </div>
                    </template>
                </div>
            </section>
        </template>

        <template x-if="isEmpty">
            <div class="flex flex-col items-center justify-center py-20 text-gray-600">
                <i class="ph-duotone ph-ghost text-4xl mb-4"></i>
                <p>No instances found</p>
            </div>
        </template>
    </div>
</main>

<!-- ===== INSTANCE DRAWER ===== -->
<div x-data="drawer" x-show="$store.dashboard.selectedInstance !== null" x-cloak class="fixed inset-0 z-50 flex justify-end" @keydown.escape.window="close()" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
        <div @click="close()" class="absolute inset-0 bg-black/70 backdrop-blur-[2px] transition-opacity" x-show="$store.dashboard.selectedInstance !== null" x-transition.opacity aria-hidden="true"></div>

        <div
            class="relative w-full max-w-lg bg-gray-950 border-l border-gray-800 h-full shadow-2xl flex flex-col"
            x-show="$store.dashboard.selectedInstance !== null"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="translate-x-full"
            x-transition:enter-end="translate-x-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="translate-x-0"
            x-transition:leave-end="translate-x-full"
        >
            <template x-if="instance">
                <div class="flex flex-col h-full">
                    <!-- Drawer Header -->
                    <div class="px-4 sm:px-6 py-4 sm:py-5 border-b border-gray-800 bg-gray-900 flex justify-between items-start gap-3">
                        <div class="min-w-0 flex-1">
                            <div class="flex items-center gap-2 mb-1 flex-wrap">
                                <h3 id="drawer-title" class="text-base sm:text-xl font-bold text-white font-mono tracking-tight break-all" x-text="instance.instance_id"></h3>
                                <span
                                    class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide border"
                                    :class="healthMeta(instance.health).badge"
                                    x-text="healthMeta(instance.health).label"
                                ></span>
                            </div>
                            <p class="text-sm text-gray-400" x-text="`${instance.app_name} v${instance.app_version}`"></p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button @click="showDeleteConfirm()" class="text-gray-500 hover:text-red-400 bg-gray-800 hover:bg-gray-700 p-2 rounded-lg transition" aria-label="Delete instance" title="Delete instance">
                                <i class="ph-bold ph-trash text-lg" aria-hidden="true"></i>
                            </button>
                            <button @click="close()" class="text-gray-500 hover:text-white bg-gray-800 hover:bg-gray-700 p-2 rounded-lg transition" aria-label="Close drawer">
                                <i class="ph-bold ph-x text-lg" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Delete Confirmation -->
                    <template x-if="confirmDelete">
                        <div class="px-4 sm:px-6 py-4 bg-red-500/5 border-b border-red-500/20" role="alertdialog">
                            <div class="flex items-start gap-3">
                                <div class="flex-shrink-0 w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center">
                                    <i class="ph-bold ph-warning text-red-500 text-xl"></i>
                                </div>
                                <div class="flex-1">
                                    <h4 class="text-sm font-bold text-red-400 mb-1">Delete this instance?</h4>
                                    <p class="text-xs text-gray-400 mb-3">This will permanently delete this instance and all its snapshots. This action cannot be undone.</p>
                                    <template x-if="deleteError">
                                        <p class="text-xs text-red-400 mb-3" x-text="deleteError"></p>
                                    </template>
                                    <div class="flex items-center gap-2">
                                        <button
                                            @click="deleteInstance()"
                                            :disabled="isDeleting"
                                            class="px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white text-xs font-medium rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1.5"
                                        >
                                            <i x-show="isDeleting" class="ph-bold ph-spinner animate-spin"></i>
                                            <span x-text="isDeleting ? 'Deleting...' : 'Delete'"></span>
                                        </button>
                                        <button
                                            @click="cancelDelete()"
                                            :disabled="isDeleting"
                                            class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs font-medium rounded-lg transition-colors disabled:opacity-50"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Drawer Content -->
                    <div class="p-4 sm:p-6 overflow-y-auto flex-1 space-y-6 sm:space-y-8">
                        <!-- System Health -->
                        <div>
                            <h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <i class="ph-bold ph-cpu"></i> System Health & Resources
                            </h4>
                            <div class="grid grid-cols-2 gap-3">
                                <template x-for="rKey in resourceKeys" :key="rKey">
                                    <template x-if="instance.metrics?.[rKey] !== undefined">
                                        <div class="bg-gray-900 border border-gray-800 p-3 rounded-lg flex flex-col">
                                            <span class="text-[10px] text-gray-500 font-bold uppercase mb-1" x-text="formatResourceKey(rKey)"></span>
                                            <div class="flex items-end justify-between">
                                                <span class="text-lg font-mono text-gray-200" x-text="formatNumber(instance.metrics[rKey])"></span>
                                                <i class="ph-fill text-gray-700 text-lg" :class="getResourceIcon(rKey)"></i>
                                            </div>
                                        </div>
                                    </template>
                                </template>
                                <template x-if="!resourceKeys?.length">
                                    <div class="col-span-2 text-xs text-gray-600 italic">No system metrics available.</div>
                                </template>
                            </div>
                        </div>

                        <!-- Environment Details -->
                        <div>
                            <h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <i class="ph-bold ph-hard-drives"></i> Environment Details
                            </h4>
                            <div class="bg-gray-900 border border-gray-800 rounded-lg p-4 space-y-3 text-sm">
                                <div class="flex justify-between border-b border-gray-800 pb-2">
                                    <span class="text-gray-500">Mode</span>
                                    <span class="text-gray-300" x-text="instance.deployment_mode"></span>
                                </div>
                                <div class="flex justify-between border-b border-gray-800 pb-2">
                                    <span class="text-gray-500">Environment</span>
                                    <span class="text-gray-300" x-text="instance.environment"></span>
                                </div>
                                <template x-for="(val, key) in instance.metrics" :key="key">
                                    <template x-if="typeof val === 'string'">
                                        <div class="flex justify-between border-b border-gray-800 last:border-0 pb-2 last:pb-0">
                                            <span class="text-gray-500" x-text="formatKey(key)"></span>
                                            <span class="text-indigo-300 font-mono text-xs" x-text="val"></span>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </div>

                        <!-- JSON Payload -->
                        <div>
                            <h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <i class="ph-bold ph-code"></i> JSON Payload
                            </h4>
                            <div class="bg-gray-950 rounded border border-gray-800 font-mono text-[10px] text-gray-400 overflow-hidden">
                                <table class="w-full">
                                    <tbody class="divide-y divide-gray-800">
                                        <template x-for="(val, key) in instance.metrics" :key="key">
                                            <tr class="hover:bg-gray-900/50">
                                                <td class="py-2 px-3 text-gray-500 border-r border-gray-800 w-1/3" x-text="key"></td>
                                                <td class="py-2 px-3 break-all text-gray-300" x-text="val"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<!-- ===== APPLICATION EDIT MODAL ===== -->
<div x-data="appEditModal" x-show="$store.dashboard.editingApp !== null" x-cloak class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" @keydown.escape.window="close()" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <!-- Backdrop -->
        <div @click="close()" class="absolute inset-0 bg-black/70 backdrop-blur-[2px]" x-show="$store.dashboard.editingApp !== null" x-transition.opacity aria-hidden="true"></div>

        <!-- Modal -->
        <div
            class="relative w-full max-w-md bg-gray-900 border border-gray-800 rounded-t-xl sm:rounded-xl shadow-2xl max-h-[90vh] overflow-y-auto"
            x-show="$store.dashboard.editingApp !== null"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 scale-95"
            x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-150"
            x-transition:leave-start="opacity-100 scale-100"
            x-transition:leave-end="opacity-0 scale-95"
        >
            <template x-if="$store.dashboard.editingApp">
                <div>
                    <!-- Header -->
                    <div class="px-4 sm:px-6 py-4 border-b border-gray-800 flex items-center justify-between gap-3">
                        <div class="min-w-0">
                            <h3 id="modal-title" class="text-lg font-bold text-white">Edit Application</h3>
                            <p class="text-sm text-gray-500 truncate" x-text="$store.dashboard.editingApp.name"></p>
                        </div>
                        <button @click="close()" class="p-2 text-gray-500 hover:text-white hover:bg-gray-800 rounded-lg transition-colors flex-shrink-0" aria-label="Close modal">
                            <i class="ph-bold ph-x text-lg" aria-hidden="true"></i>
                        </button>
                    </div>

                    <!-- Body -->
                    <div class="p-4 sm:p-6 space-y-5">
                        <!-- Error Message -->
                        <template x-if="error">
                            <div class="p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-sm text-red-400 flex items-center gap-2">
                                <i class="ph-bold ph-warning-circle"></i>
                                <span x-text="error"></span>
                            </div>
                        </template>

                        <!-- Success Message -->
                        <template x-if="success">
                            <div class="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-lg text-sm text-emerald-400 flex items-center gap-2">
                                <i class="ph-bold ph-check-circle"></i>
                                <span x-text="success"></span>
                            </div>
                        </template>

                        <!-- GitHub URL Field -->
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">
                                <i class="ph-bold ph-github-logo mr-1"></i> GitHub Repository
                            </label>
                            <div class="flex gap-2">
                                <input
                                    type="url"
                                    x-model="form.github_url"
                                    placeholder="https://github.com/owner/repo"
                                    class="flex-1 bg-gray-950 border rounded-lg px-4 py-2.5 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500/50"
                                    :class="isValidGitHubUrl ? 'border-gray-800 focus:border-primary-500' : 'border-red-500/50'"
                                >
                                <button
                                    @click="refreshStars()"
                                    :disabled="refreshingStars || !form.github_url || !isValidGitHubUrl"
                                    class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                    title="Refresh GitHub stars"
                                    aria-label="Refresh GitHub stars"
                                >
                                    <i class="ph-bold ph-arrows-clockwise" :class="{ 'animate-spin': refreshingStars }" aria-hidden="true"></i>
                                </button>
                            </div>
                            <p class="mt-1.5 text-xs text-gray-600">Used to display GitHub stars badge</p>
                            <template x-if="!isValidGitHubUrl">
                                <p class="mt-1 text-xs text-red-400">Invalid GitHub URL format</p>
                            </template>
                        </div>

                        <!-- Logo URL Field -->
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">
                                <i class="ph-bold ph-image mr-1" aria-hidden="true"></i> Logo URL
                            </label>
                            <input
                                type="url"
                                x-model="form.logo_url"
                                placeholder="https://example.com/logo.png"
                                class="w-full bg-gray-950 border rounded-lg px-4 py-2.5 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500/50"
                                :class="isValidLogoUrl ? 'border-gray-800 focus:border-primary-500' : 'border-red-500/50'"
                            >
                            <p class="mt-1.5 text-xs text-gray-600">Custom logo image (SVG, PNG, or JPG) - HTTPS only</p>
                            <template x-if="!isValidLogoUrl">
                                <p class="mt-1 text-xs text-red-400">Invalid URL. Must be HTTPS with valid image extension or from allowed domain.</p>
                            </template>
                        </div>

                        <!-- Logo Preview -->
                        <template x-if="form.logo_url">
                            <div class="flex items-center gap-3 p-3 bg-gray-950 border border-gray-800 rounded-lg">
                                <img :src="form.logo_url" alt="Logo preview" class="w-10 h-10 object-contain rounded" @error="$el.style.display='none'">
                                <span class="text-xs text-gray-500">Logo preview</span>
                            </div>
                        </template>

                        <!-- Current Stats -->
                        <div class="pt-3 border-t border-gray-800">
                            <p class="text-xs text-gray-500 mb-2">Current Stats</p>
                            <div class="flex items-center gap-4 text-sm">
                                <div class="flex items-center gap-1.5 text-gray-400">
                                    <i class="ph-fill ph-star text-yellow-500"></i>
                                    <span x-text="$store.dashboard.editingApp.stars || 0"></span>
                                    <span class="text-gray-600">stars</span>
                                </div>
                                <template x-if="$store.dashboard.editingApp.stars_updated_at">
                                    <span class="text-xs text-gray-600" x-text="'Updated ' + new Date($store.dashboard.editingApp.stars_updated_at).toLocaleDateString()"></span>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="px-4 sm:px-6 py-4 border-t border-gray-800 flex items-center justify-end gap-3">
                        <button
                            @click="close()"
                            class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-white transition-colors"
                        >
                            Cancel
                        </button>
                        <button
                            @click="save()"
                            :disabled="saving || !hasChanges || !isFormValid"
                            class="px-4 py-2 bg-primary-500 hover:bg-primary-600 text-white text-sm font-medium rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                        >
                            <i x-show="saving" class="ph-bold ph-spinner animate-spin"></i>
                            <span x-text="saving ? 'Saving...' : 'Save Changes'"></span>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

</body>
</html>
